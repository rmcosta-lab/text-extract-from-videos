<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sugestão de crop</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 1.5rem; font: 15px/1.5 system-ui, sans-serif;
    background: Canvas; color: CanvasText; max-width: 1400px; margin-inline: auto;
  }
  h1 { font-size: 1.3rem; margin: 0 0 .25rem; }
  #meta { opacity: .75; margin: 0 0 .25rem; }
  #analysis { opacity: .75; margin: 0 0 1rem; font-size: .9rem; }
  form {
    display: flex; flex-wrap: wrap; gap: 1rem; align-items: end;
    padding: 1rem; border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
    border-radius: 8px; margin-bottom: 1rem;
  }
  label { display: flex; flex-direction: column; gap: .25rem; font-weight: 600; }
  input[type=number], select {
    width: 7.5rem; padding: .4rem .5rem; font: inherit;
    border: 1px solid color-mix(in srgb, CanvasText 35%, transparent);
    border-radius: 6px; background: Field; color: FieldText;
  }
  #flags-row {
    display: flex; gap: .5rem; align-items: center; flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  code {
    padding: .45rem .6rem; border-radius: 6px; font-size: .9rem;
    background: color-mix(in srgb, CanvasText 8%, Canvas);
    border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
  }
  button {
    padding: .45rem .9rem; font: inherit; font-weight: 600; cursor: pointer;
    border: 1px solid color-mix(in srgb, CanvasText 35%, transparent);
    border-radius: 6px; background: color-mix(in srgb, CanvasText 6%, Canvas);
    color: CanvasText;
  }
  #notice { margin: 0 0 1rem; font-weight: 600; }
  #notice.error { color: #c0392b; }
  #notice.info { color: #b9770e; }
  .previews { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 900px) { .previews { grid-template-columns: 1fr; } }
  figure { margin: 0; min-width: 0; }
  figcaption { font-weight: 600; margin-bottom: .4rem; }
  img {
    max-width: 100%; height: auto; display: block; border-radius: 6px;
    border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
  }
  .frame-wrap {
    position: relative; border-radius: 6px; overflow: hidden;
    border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
  }
  .frame-wrap img { border: none; border-radius: 0; }
  .crop-outline {
    position: absolute; pointer-events: none; border: 2px solid #e74c3c;
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, .45); display: none;
    left: var(--crop-left, 0%); right: var(--crop-right, 0%);
    top: var(--crop-top, 0%); bottom: var(--crop-bottom, 0%);
  }
  body.has-crop .crop-outline:not([hidden]) { display: block; }
  #busy { opacity: .6; }
  .zoomable { cursor: zoom-in; }
  #samples-title { font-size: 1.05rem; margin: 1.5rem 0 .5rem; }
  #samples {
    display: grid; gap: .75rem;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  }
  #samples figcaption {
    font-weight: 600; font-size: .85rem; margin: .25rem 0 0;
  }
  #samples .informing figcaption { color: #1e8449; }
  #samples .crop-outline { border-width: 1px; }
  #zoom {
    position: fixed; inset: 0; z-index: 10; cursor: zoom-out;
    display: flex; flex-direction: column; gap: .5rem;
    align-items: center; justify-content: center;
    padding: 1rem; background: rgba(0, 0, 0, .82);
  }
  #zoom[hidden] { display: none; }
  #zoom img {
    max-width: 96vw; max-height: 90vh; width: auto;
    border: none; background: #fff;
  }
  #zoom .frame-wrap { border: none; border-radius: 0; }
  #zoom figcaption { color: #fff; font-weight: 600; }
</style>
</head>
<body>
<h1>Sugestão de crop</h1>
<p id="meta">Carregando…</p>
<p id="analysis" hidden></p>

<form id="controls" autocomplete="off">
  <label>Engine
    <select id="engine">
      <option value="tesseract" selected>tesseract</option>
      <option value="paddle">paddle</option>
    </select>
  </label>
  <label>Left <input id="left" type="number" min="0" step="1" value="0"></label>
  <label>Top <input id="top" type="number" min="0" step="1" value="0"></label>
  <label>Right <input id="right" type="number" min="0" step="1" value="0"></label>
  <label>Bottom <input id="bottom" type="number" min="0" step="1" value="0"></label>
  <button type="button" id="resuggest">Voltar à sugestão</button>
</form>

<div id="flags-row">
  <code id="flags">—</code>
  <button type="button" id="copy">Copiar</button>
  <span id="busy" hidden>processando…</span>
</div>

<p id="notice" hidden></p>

<div class="previews">
  <figure>
    <figcaption>Original (frame <span id="frame-index">?</span>) — o retângulo
      marca a área mantida</figcaption>
    <div class="frame-wrap">
      <img id="original" class="zoomable" alt="Frame original">
      <div class="crop-outline"></div>
    </div>
  </figure>
  <figure>
    <figcaption>Com crop (<span id="cropped-size">?</span>)</figcaption>
    <img id="cropped" class="zoomable" alt="Frame com crop aplicado">
  </figure>
</div>

<h2 id="samples-title">Frames amostrados (<span id="sample-count">?</span>)
  — clique para ampliar; no zoom, ← e → navegam</h2>
<div id="samples"></div>

<figure id="zoom" hidden>
  <div class="frame-wrap">
    <img id="zoom-img" alt="Frame ampliado">
    <div id="zoom-outline" class="crop-outline" hidden></div>
  </div>
  <figcaption id="zoom-caption"></figcaption>
</figure>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const edges = ["left", "top", "right", "bottom"];
let suggested = null;
let frameSize = null;
let debounceTimer = null;
let sampleFrameIndices = [];
let zoomSamplePosition = null;

function setNotice(text, kind) {
  const el = $("notice");
  el.hidden = !text;
  el.textContent = text || "";
  el.className = kind || "";
}

function setBusy(busy) { $("busy").hidden = !busy; }

function updateOutline() {
  document.body.classList.toggle("has-crop", Boolean(frameSize));
  if (!frameSize) return;
  const pct = (value, total) =>
    (Math.max(0, Number(value) || 0) / total * 100) + "%";
  const style = document.documentElement.style;
  style.setProperty("--crop-left", pct($("left").value, frameSize.width));
  style.setProperty("--crop-right", pct($("right").value, frameSize.width));
  style.setProperty("--crop-top", pct($("top").value, frameSize.height));
  style.setProperty("--crop-bottom", pct($("bottom").value, frameSize.height));
}

function setCropped(base64, width, height) {
  $("cropped").src = "data:image/png;base64," + base64;
  $("cropped-size").textContent = width + " × " + height + " px";
}

function openZoom(src, caption, withOutline) {
  zoomSamplePosition = null;
  $("zoom-img").src = src;
  $("zoom-caption").textContent = caption;
  $("zoom-outline").hidden = !withOutline;
  $("zoom").hidden = false;
}

function openSampleZoom(position) {
  const frameIndex = sampleFrameIndices[position];
  openZoom(
    "/api/frame/" + frameIndex,
    "Frame " + frameIndex + " (" + (position + 1) + " de " +
      sampleFrameIndices.length + " — ← e → navegam)",
    true
  );
  zoomSamplePosition = position;
}

function closeZoom() {
  zoomSamplePosition = null;
  $("zoom").hidden = true;
  $("zoom-img").src = "";
}

function renderSamples(data) {
  const informing = new Set(data.text_frame_indices || []);
  const frames = data.sample_frames || [];
  sampleFrameIndices = frames.map((sample) => sample.frame_index);
  $("sample-count").textContent = frames.length;
  const container = $("samples");
  container.replaceChildren();
  frames.forEach((sample, position) => {
    const figure = document.createElement("figure");
    if (informing.has(sample.frame_index)) figure.className = "informing";
    const img = document.createElement("img");
    img.className = "zoomable";
    img.src = "data:image/png;base64," + sample.png_base64;
    img.alt = "Frame " + sample.frame_index;
    img.addEventListener("click", () => openSampleZoom(position));
    const wrap = document.createElement("div");
    wrap.className = "frame-wrap";
    const outline = document.createElement("div");
    outline.className = "crop-outline";
    wrap.append(img, outline);
    const caption = document.createElement("figcaption");
    caption.textContent = "frame " + sample.frame_index +
      (informing.has(sample.frame_index) ? " — com texto" : "");
    figure.append(wrap, caption);
    container.append(figure);
  });
}

function applyPreview(data) {
  suggested = data.crop;
  frameSize = { width: data.frame_width, height: data.frame_height };
  for (const edge of edges) $(edge).value = data.crop[edge];
  updateOutline();
  $("flags").textContent = data.cli_flags;
  $("meta").textContent = data.video_name + " — frame " + data.frame_index +
    " de referência, " + data.frame_width + " × " + data.frame_height + " px";
  const analyzed = data.analyzed_frame_indices || [];
  const withText = data.text_frame_indices || [];
  const skipped = data.skipped_frame_indices || [];
  $("analysis").hidden = false;
  $("analysis").textContent = "Sugestão combinada de " + analyzed.length +
    " frames analisados (" + withText.length + " informaram a sugestão: " +
    withText.join(", ") + ")" +
    (skipped.length ? " — não decodificados: " + skipped.join(", ") : "");
  $("frame-index").textContent = data.frame_index;
  $("original").src = "data:image/png;base64," + data.original_png_base64;
  renderSamples(data);
  setCropped(
    data.cropped_png_base64,
    data.frame_width - data.crop.left - data.crop.right,
    data.frame_height - data.crop.top - data.crop.bottom
  );
  setNotice(
    data.text_detected
      ? ""
      : "Nenhum texto detectado no frame de referência — mostrando o frame " +
        "inteiro (crop zero). Nada foi inventado.",
    "info"
  );
}

async function loadPreview() {
  setBusy(true);
  setNotice("", "");
  try {
    const response = await fetch("/api/preview?engine=" + $("engine").value);
    const data = await response.json();
    if (!response.ok) throw new Error(data.detail || "falha ao gerar a sugestão");
    applyPreview(data);
  } catch (err) {
    setNotice(err.message, "error");
  } finally {
    setBusy(false);
  }
}

async function recrop() {
  const body = {};
  for (const edge of edges) body[edge] = Math.max(0, Number($(edge).value) || 0);
  setBusy(true);
  try {
    const response = await fetch("/api/crop", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await response.json();
    if (!response.ok) {
      const detail = typeof data.detail === "string"
        ? data.detail : "valores de crop inválidos";
      throw new Error(detail);
    }
    setNotice("", "");
    $("flags").textContent = data.cli_flags;
    setCropped(data.cropped_png_base64, data.cropped_width, data.cropped_height);
  } catch (err) {
    setNotice(err.message, "error");
  } finally {
    setBusy(false);
  }
}

for (const edge of edges) {
  $(edge).addEventListener("input", () => {
    updateOutline();
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(recrop, 400);
  });
}
$("engine").addEventListener("change", loadPreview);
$("resuggest").addEventListener("click", () => {
  if (!suggested) return;
  for (const edge of edges) $(edge).value = suggested[edge];
  updateOutline();
  recrop();
});
$("copy").addEventListener("click", async () => {
  await navigator.clipboard.writeText($("flags").textContent);
  $("copy").textContent = "Copiado!";
  setTimeout(() => { $("copy").textContent = "Copiar"; }, 1200);
});
$("original").addEventListener("click", () => openZoom(
  $("original").src, "Original — frame " + $("frame-index").textContent, true
));
$("cropped").addEventListener("click", () => openZoom(
  $("cropped").src, "Com crop (" + $("cropped-size").textContent + ")", false
));
$("zoom").addEventListener("click", closeZoom);
document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") { closeZoom(); return; }
  if ($("zoom").hidden || zoomSamplePosition === null) return;
  if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") return;
  event.preventDefault();
  const step = event.key === "ArrowLeft" ? -1 : 1;
  const total = sampleFrameIndices.length;
  openSampleZoom((zoomSamplePosition + step + total) % total);
});

loadPreview();
</script>
</body>
</html>
